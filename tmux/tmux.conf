unbind C-b
set-option -g prefix M-,
bind-key M-, send-prefix

setw -g mode-keys emacs
set -g mode-keys vi
set -g status-left-length 100
set -g base-index 1
set -g detach-on-destroy off
set -g mouse on
set -g status-position top
set -g window-status-format " #I:#W "
set -g window-status-current-format "[#I:#W]"
set -g history-limit 5000
set -g status-justify left

# remove status-left, push status* to the left
set -g status-left "" 

# start status-right with absolute-centre, then align right
set -g status-right " \
    #[align=centre] [#S:#(basename '#{pane_current_path}')] \
    #[align=right]#{host}\
"

set -g status-right-length 100

setw -g pane-base-index 1

bind-key \" 'split-window -v -c "#{pane_current_path}"'
bind-key | 'split-window -h -c "#{pane_current_path}"'
bind-key % 'split-window -h -c "#{pane_current_path}"'

##
# Leaderless bindings
##
# bind-key -n M-K list-keys
bind-key -n M-\{ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

bind-key -n M-\: command-prompt
bind-key -n M-S "source $HOME/.config/tmux/tmux.conf; display 'tmux.conf reloaded'"

bind-key -n C-M-s command-prompt -p session: 'new-session -s %1 -c "#{pane_current_path}"'
bind-key -n M-< command-prompt -I "#W" { rename-window "%%" }
bind-key -n M-> command-prompt -I "#S" { rename-session "%%" }
bind-key -n C-M-, switch-client -p
bind-key -n C-M-. switch-client -n

bind-key -n C-M-c command-prompt -p window: 'new-window -n %1 -c "#{pane_current_path}"'
bind-key -n M-\" 'split-window -v -c "#{pane_current_path}"'
bind-key -n M-| 'split-window -h -c "#{pane_current_path}"'
bind-key -n C-M-i select-window -t -
bind-key -n C-M-o select-window -t +
bind-key -n C-M-\[ select-window -t -
bind-key -n C-M-\] select-window -t +

bind-key -n M-\! select-window -t:1
bind-key -n M-\@ select-window -t:2
bind-key -n M-\# select-window -t:3
bind-key -n M-\$ select-window -t:4
bind-key -n M-\% select-window -t:5

bind-key -n C-M-h select-pane -L
bind-key -n C-M-j select-pane -D
bind-key -n C-M-k select-pane -U
bind-key -n C-M-l select-pane -R
